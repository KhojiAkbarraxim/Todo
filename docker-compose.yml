version: '3.8'

services:
  php:
    build: ./php
    container_name: todo_php
    ports:
      - "8080:80"
    volumes:
      - ./src/public:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: tododb
      DB_USER: todouser
      DB_PASS: todopass

  db:
    image: mysql:8.0
    container_name: todo_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tododb
      MYSQL_USER: todouser
      MYSQL_PASSWORD: todopass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "todouser", "-ptodopass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: